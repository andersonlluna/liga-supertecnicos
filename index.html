<style>
/* ════════════════════════════════════════════════════════════════
   SUPERTECNICOS · CARTOLA 2026
   Foco em legibilidade 45+ : Inter uniforme, números grandes,
   contraste forte, hierarquia óbvia.
   ════════════════════════════════════════════════════════════════ */

/* DARK · BLUEPRINT */
:root, [data-theme="dark"] {
  --ink:#0A1628;
  --surface:#16243F;
  --surface-2:#1F2F4F;
  --surface-3:#2B3D63;

  --border:rgba(224,235,245,.10);
  --border-2:rgba(224,235,245,.24);
  --border-3:rgba(224,235,245,.40);

  --text:#E8F0FA;
  --text-2:#94A6BC;
  --text-3:#5C6F86;

  --gold:#FACC15;
  --gold-deep:#A88408;
  --gold-bg:rgba(250,204,21,.12);
  --gold-bg-2:rgba(250,204,21,.22);

  --cool:#38BDF8;
  --cool-deep:#0369A1;
  --cool-bg:rgba(56,189,248,.12);

  --blood:#FB923C;
  --blood-deep:#9A3412;
  --blood-bg:rgba(251,146,60,.13);
}

/* LIGHT · BLUEPRINT */
[data-theme="light"] {
  --ink:#F0F5FA;
  --surface:#FFFFFF;
  --surface-2:#E1EBF5;
  --surface-3:#CDD9E8;

  --border:rgba(10,22,40,.12);
  --border-2:rgba(10,22,40,.24);
  --border-3:rgba(10,22,40,.40);

  --text:#0A1628;
  --text-2:#3D4F66;
  --text-3:#6B7B91;

  --gold:#A88408;
  --gold-deep:#735807;
  --gold-bg:rgba(168,132,8,.10);
  --gold-bg-2:rgba(168,132,8,.20);

  --cool:#0369A1;
  --cool-deep:#075985;
  --cool-bg:rgba(3,105,161,.10);

  --blood:#C2410C;
  --blood-deep:#9A3412;
  --blood-bg:rgba(194,65,12,.10);
}

:root {
  --ease:cubic-bezier(.2,.7,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --page-max:560px;
  --px:18px;
}

*,*::before,*::after{
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html{
  scroll-behavior:smooth;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body{
  background:var(--ink); color:var(--text);
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  font-size:18px; line-height:1.5;
  font-feature-settings:"cv11","ss01";
  min-height:100vh; min-height:100dvh;
  padding-bottom:calc(86px + env(safe-area-inset-bottom,0px));
  overflow-x:hidden;
  transition:background .35s var(--ease), color .35s var(--ease);
}

.tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}

/* ────────────────────────────────────────────────────────────────
   MASTHEAD
   ──────────────────────────────────────────────────────────────── */
.mast{
  position:sticky; top:0; z-index:50;
  background:color-mix(in srgb, var(--ink) 96%, transparent);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.mast-in{
  max-width:var(--page-max); margin:0 auto;
  padding:14px var(--px) 12px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.mast-name{
  font-weight:900; font-size:26px;
  color:var(--text); letter-spacing:-.02em; line-height:1;
}
.mast-name em{color:var(--gold); font-style:normal}
.mast-right{display:flex; align-items:center; gap:10px}
.mast-tag{
  font-weight:700; font-size:14px;
  color:var(--gold);
  background:var(--gold-bg);
  padding:8px 14px; border-radius:10px;
  letter-spacing:.01em;
}
.theme-btn{
  background:transparent;
  border:1px solid var(--border-2);
  border-radius:10px;
  width:40px; height:40px;
  cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center;
  color:var(--text-2);
  transition:all .2s var(--ease);
}
.theme-btn:hover{color:var(--text); border-color:var(--border-3)}
.theme-btn:active{transform:scale(.95)}
.theme-btn svg{width:18px; height:18px; stroke:currentColor; stroke-width:2; fill:none}

.mast-bar{
  height:3px; background:var(--border);
  position:relative; overflow:hidden;
}
.mast-bar-fill{
  position:absolute; inset:0 auto 0 0;
  background:var(--gold);
  width:0%; transition:width 1.4s var(--ease-out);
}

/* ────────────────────────────────────────────────────────────────
   BOTTOM NAV
   ──────────────────────────────────────────────────────────────── */
.nav{
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  background:color-mix(in srgb, var(--ink) 96%, transparent);
  backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--border-2);
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.nav-g{
  max-width:var(--page-max); margin:0 auto;
  display:grid; grid-template-columns:repeat(3,1fr);
}
.ntab{
  background:none; border:0; cursor:pointer;
  padding:14px 6px 12px; min-height:74px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  color:var(--text-2);
  font-family:inherit;
  position:relative;
  transition:color .2s var(--ease);
}
.ntab-no{font-weight:600; font-size:11px; color:var(--text-3); letter-spacing:.04em}
.ntab-tt{font-weight:700; font-size:15px; color:currentColor; letter-spacing:-.005em}
.ntab::after{
  content:''; position:absolute; top:0; left:50%;
  transform:translateX(-50%);
  width:0; height:3px; background:var(--gold);
  transition:width .3s var(--ease);
  border-radius:0 0 3px 3px;
}
.ntab.on{color:var(--text)}
.ntab.on .ntab-no{color:var(--gold)}
.ntab.on::after{width:46px}

/* ────────────────────────────────────────────────────────────────
   WRAP & PAGES
   ──────────────────────────────────────────────────────────────── */
.wrap{
  max-width:var(--page-max); margin:0 auto;
  padding:18px var(--px) 28px;
}
.pg{display:none}
.pg.on{display:block}
.pg.on > *{animation:up .42s var(--ease-out) both}
.pg.on > *:nth-child(2){animation-delay:.05s}
.pg.on > *:nth-child(3){animation-delay:.10s}
.pg.on > *:nth-child(4){animation-delay:.15s}
.pg.on > *:nth-child(5){animation-delay:.20s}
.pg.on > *:nth-child(6){animation-delay:.25s}
.pg.on > *:nth-child(7){animation-delay:.30s}
@keyframes up{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none}}

/* ────────────────────────────────────────────────────────────────
   SECTION TITLE — barra colorida + texto bold grande
   ──────────────────────────────────────────────────────────────── */
.s-title{
  display:flex; align-items:center; gap:12px;
  font-weight:800; font-size:20px; color:var(--text);
  margin:24px 0 14px;
  letter-spacing:-.005em;
}
.s-title::before{
  content:''; width:5px; height:24px; background:var(--gold);
  border-radius:3px; flex-shrink:0;
}
.s-title.cool::before{background:var(--cool)}
.s-title.blood::before{background:var(--blood)}
.s-title .sub{
  font-weight:600; font-size:14px; color:var(--text-2); margin-left:auto;
}

/* ────────────────────────────────────────────────────────────────
   CRESTS (escudos SVG dos times)
   ──────────────────────────────────────────────────────────────── */
.crest{display:inline-block; flex-shrink:0}
.crest-sm{width:32px; height:38px}
.crest-md{width:46px; height:56px}
.crest-lg{width:64px; height:78px}
.crest svg{display:block; width:100%; height:100%}

/* ════════════════════════════════════════════════════════════════
   P1 · TABELA · pódio + lista grande
   ════════════════════════════════════════════════════════════════ */

/* PÓDIO */
.podio{
  display:grid; grid-template-columns:1fr 1.25fr 1fr;
  gap:8px; align-items:end;
  margin-bottom:8px;
}
.pod{
  padding:14px 10px 16px;
  border-radius:14px; text-align:center;
  background:var(--surface);
  border:2px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  min-height:140px;
}
.pod1{border-color:var(--gold); background:var(--gold-bg); padding-top:18px; min-height:160px}
.pod2{border-color:var(--border-3)}
.pod3{border-color:var(--gold-bg-2); background:var(--gold-bg)}
.pod-medal{
  font-weight:900; font-size:28px; line-height:1;
  margin-bottom:8px; color:var(--text-2);
}
.pod1 .pod-medal{color:var(--gold); font-size:38px}
.pod2 .pod-medal{color:var(--text)}
.pod3 .pod-medal{color:var(--gold)}
.pod-crest{margin-bottom:8px}
.pod-name{
  font-weight:800; font-size:14px; color:var(--text);
  line-height:1.2; margin-bottom:6px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.pod1 .pod-name{font-size:16px}
.pod-pts{
  font-weight:900; font-size:22px; color:var(--gold);
  line-height:1; letter-spacing:-.02em;
}
.pod1 .pod-pts{font-size:30px}

/* LISTA TABELA — 1 linha por time */
.tab-list{display:flex; flex-direction:column; gap:8px}
.tab-row{
  display:flex; align-items:center; gap:12px;
  padding:14px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  transition:transform .15s var(--ease), border-color .15s;
}
.tab-row:active{transform:scale(.99)}
.tab-row.t1{border-color:var(--gold); background:var(--gold-bg)}
.tab-row.last{border-color:color-mix(in srgb, var(--blood) 30%, var(--border))}
.tab-pos{
  font-weight:900; font-size:24px; color:var(--text-2);
  min-width:32px; text-align:center; line-height:1;
}
.tab-row.t1 .tab-pos{color:var(--gold)}
.tab-row.last .tab-pos{color:var(--blood)}
.tab-mid{flex:1; min-width:0; display:flex; flex-direction:column; gap:6px}
.tab-name{
  font-weight:800; font-size:18px; color:var(--text);
  letter-spacing:-.005em;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.15;
}
.tab-badges{display:flex; gap:6px; flex-wrap:wrap}
.tab-badge{
  display:inline-flex; align-items:center;
  padding:4px 10px; border-radius:7px;
  font-weight:700; font-size:12px;
  letter-spacing:.01em;
}
.b-mvp{background:var(--gold-bg-2); color:var(--gold)}
.b-mit{background:var(--cool-bg); color:var(--cool-deep)}
[data-theme="dark"] .b-mit{color:var(--cool)}
.b-lan{background:var(--blood-bg); color:var(--blood-deep)}
[data-theme="dark"] .b-lan{color:var(--blood)}
.tab-pts{
  font-weight:900; font-size:26px; color:var(--gold);
  text-align:right; letter-spacing:-.025em; line-height:1;
}

/* ════════════════════════════════════════════════════════════════
   P2 · RODADAS
   ════════════════════════════════════════════════════════════════ */

/* PILLS GRANDES */
.pill-wrap{
  margin:6px -18px 4px;
  padding:0 18px;
  overflow-x:auto; overflow-y:hidden;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.pill-wrap::-webkit-scrollbar{display:none}
.pills{display:inline-flex; gap:8px; padding-bottom:6px}
.pill{
  flex-shrink:0;
  background:var(--surface);
  border:2px solid var(--border);
  color:var(--text-2);
  font-family:inherit;
  font-weight:700; font-size:16px;
  padding:14px 18px;
  min-height:54px; min-width:74px;
  border-radius:12px;
  cursor:pointer;
  transition:all .18s var(--ease);
  letter-spacing:-.01em;
}
.pill:hover{border-color:var(--border-3); color:var(--text)}
.pill:active{transform:scale(.97)}
.pill.on{
  background:var(--gold); color:var(--ink);
  border-color:var(--gold);
}

/* HERO MVP DA RODADA — card grande */
.hero{
  padding:26px 22px 28px;
  background:linear-gradient(135deg, color-mix(in srgb, var(--gold) 28%, var(--surface)) 0%, var(--surface) 100%);
  border:2px solid var(--gold);
  border-radius:18px;
  margin-bottom:14px;
  display:flex; gap:18px; align-items:center;
}
.hero-info{flex:1; min-width:0}
.hero-tag{
  display:inline-block;
  padding:7px 14px;
  background:var(--gold); color:var(--ink);
  font-weight:900; font-size:13px;
  letter-spacing:.04em; text-transform:uppercase;
  border-radius:8px;
  margin-bottom:14px;
}
.hero-name{
  font-weight:900; font-size:24px;
  color:var(--text); letter-spacing:-.02em;
  line-height:1.1; margin-bottom:14px;
}
.hero-pts{
  font-weight:900; font-size:64px;
  color:var(--gold); line-height:.9;
  letter-spacing:-.04em;
}
.hero-pts-lbl{
  font-weight:700; font-size:13px;
  color:var(--text-2);
  letter-spacing:.06em; text-transform:uppercase;
  margin-top:6px;
}

/* DUO MITADAS + LANTERNA */
.duo{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px}
.duo-card{
  padding:16px 14px;
  border-radius:14px;
  border:2px solid;
}
.duo-mit{background:var(--cool-bg); border-color:var(--cool)}
.duo-lan{background:var(--blood-bg); border-color:var(--blood)}
.duo-tag{
  font-weight:800; font-size:11px;
  letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:10px;
}
.duo-mit .duo-tag{color:var(--cool-deep)}
[data-theme="dark"] .duo-mit .duo-tag{color:var(--cool)}
.duo-lan .duo-tag{color:var(--blood-deep)}
[data-theme="dark"] .duo-lan .duo-tag{color:var(--blood)}
.duo-name{
  font-weight:800; font-size:15px;
  color:var(--text); line-height:1.2;
  margin-bottom:8px; min-height:36px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden;
}
.duo-pts{
  font-weight:900; font-size:32px;
  letter-spacing:-.03em; line-height:1;
}
.duo-mit .duo-pts{color:var(--cool-deep)}
[data-theme="dark"] .duo-mit .duo-pts{color:var(--cool)}
.duo-lan .duo-pts{color:var(--blood-deep)}
[data-theme="dark"] .duo-lan .duo-pts{color:var(--blood)}
.duo-sub{
  font-weight:600; font-size:13px;
  color:var(--text-2); margin-top:4px;
}

/* MITARAM list (chips) */
.mitou-card{
  padding:16px 18px;
  background:var(--surface);
  border:1px solid var(--cool-bg);
  border-radius:14px;
  margin-bottom:14px;
}
.mitou-head{
  font-weight:800; font-size:14px;
  color:var(--cool-deep);
  margin-bottom:12px;
  letter-spacing:-.005em;
}
[data-theme="dark"] .mitou-head{color:var(--cool)}
.mitou-list{display:flex; flex-wrap:wrap; gap:8px}
.mitou-chip{
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 12px;
  background:var(--cool-bg);
  border-radius:10px;
  font-weight:700; font-size:14px;
}
.mitou-chip .nm{color:var(--text)}
.mitou-chip .pt{color:var(--cool-deep); font-weight:900}
[data-theme="dark"] .mitou-chip .pt{color:var(--cool)}
.mitou-empty{
  font-weight:600; font-size:14px;
  color:var(--text-2); font-style:italic;
}

/* DEMAIS COLOCAÇÕES — lista compacta */
.gw-list{display:flex; flex-direction:column; gap:6px}
.gw-row{
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
}
.gw-pos{
  font-weight:800; font-size:18px; color:var(--text-2);
  min-width:28px; text-align:center;
}
.gw-name{
  flex:1; font-weight:700; font-size:16px; color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.gw-pts{
  font-weight:900; font-size:22px;
  color:var(--text); letter-spacing:-.02em;
}
.gw-pts.mit{color:var(--cool)}
[data-theme="light"] .gw-pts.mit{color:var(--cool-deep)}

/* ════════════════════════════════════════════════════════════════
   P3 · STATS
   ════════════════════════════════════════════════════════════════ */

/* RECORDES — 2 cards */
.records{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.rec{
  padding:18px 18px;
  background:var(--surface);
  border:2px solid;
  border-radius:14px;
}
.rec-mvp{border-color:var(--gold); background:var(--gold-bg)}
.rec-lan{border-color:var(--blood); background:var(--blood-bg)}
.rec-tag{
  font-weight:800; font-size:11px;
  letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:10px;
}
.rec-mvp .rec-tag{color:var(--gold-deep)}
[data-theme="dark"] .rec-mvp .rec-tag{color:var(--gold)}
.rec-lan .rec-tag{color:var(--blood-deep)}
[data-theme="dark"] .rec-lan .rec-tag{color:var(--blood)}
.rec-pts{
  font-weight:900; font-size:42px;
  line-height:1; margin-bottom:10px;
  letter-spacing:-.04em;
}
.rec-mvp .rec-pts{color:var(--gold)}
[data-theme="light"] .rec-mvp .rec-pts{color:var(--gold-deep)}
.rec-lan .rec-pts{color:var(--blood)}
[data-theme="light"] .rec-lan .rec-pts{color:var(--blood-deep)}
.rec-name{
  font-weight:800; font-size:15px;
  color:var(--text); line-height:1.2;
  margin-bottom:3px;
}
.rec-rd{
  font-weight:600; font-size:13px;
  color:var(--text-2);
}

/* REIS — 3 cards grandes */
.kings{display:flex; flex-direction:column; gap:12px}
.king{
  padding:18px 20px;
  background:var(--surface);
  border:2px solid;
  border-radius:16px;
  display:grid; grid-template-columns:auto 1fr auto; gap:16px;
  align-items:center;
}
.king.gold{border-color:var(--gold); background:var(--gold-bg)}
.king.cool{border-color:var(--cool); background:var(--cool-bg)}
.king.blood{border-color:var(--blood); background:var(--blood-bg)}
.king-info{min-width:0}
.king-tag{
  font-weight:800; font-size:11px;
  letter-spacing:.06em; text-transform:uppercase;
  margin-bottom:6px;
}
.king.gold .king-tag{color:var(--gold-deep)}
[data-theme="dark"] .king.gold .king-tag{color:var(--gold)}
.king.cool .king-tag{color:var(--cool-deep)}
[data-theme="dark"] .king.cool .king-tag{color:var(--cool)}
.king.blood .king-tag{color:var(--blood-deep)}
[data-theme="dark"] .king.blood .king-tag{color:var(--blood)}
.king-name{
  font-weight:900; font-size:20px;
  color:var(--text); letter-spacing:-.01em;
  line-height:1.15;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.king-cnt-wrap{text-align:right}
.king-cnt{
  font-weight:900; font-size:42px;
  line-height:1; letter-spacing:-.04em;
}
.king.gold .king-cnt{color:var(--gold)}
[data-theme="light"] .king.gold .king-cnt{color:var(--gold-deep)}
.king.cool .king-cnt{color:var(--cool)}
[data-theme="light"] .king.cool .king-cnt{color:var(--cool-deep)}
.king.blood .king-cnt{color:var(--blood)}
[data-theme="light"] .king.blood .king-cnt{color:var(--blood-deep)}
.king-cnt-sub{
  font-weight:600; font-size:12px;
  color:var(--text-2); margin-top:2px;
}

/* HALL OF FAME / FLOP */
.hof{display:flex; flex-direction:column; gap:6px}
.hof-row{
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
}
.hof-num{
  font-weight:900; font-size:20px;
  color:var(--text-3);
  min-width:24px; text-align:center;
}
.hof-name{
  flex:1; min-width:0;
  font-weight:700; font-size:16px;
  color:var(--text);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hof-rd{
  font-weight:700; font-size:13px;
  color:var(--text-2);
  padding:4px 10px; background:var(--surface-2);
  border-radius:6px;
}
.hof-pts{
  font-weight:900; font-size:22px;
  color:var(--gold); letter-spacing:-.02em;
}
[data-theme="light"] .hof-pts{color:var(--gold-deep)}
.hof.flop .hof-pts{color:var(--blood)}
[data-theme="light"] .hof.flop .hof-pts{color:var(--blood-deep)}

/* ────────────────────────────────────────────────────────────────
   LOADING / ERROR
   ──────────────────────────────────────────────────────────────── */
.loading{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; padding:40px 24px; text-align:center;
}
.loading-mark{
  font-weight:900; font-size:48px;
  color:var(--text); letter-spacing:-.03em; line-height:1;
}
.loading-mark em{color:var(--gold); font-style:normal}
.loading-bar{
  width:120px; height:3px; background:var(--border-2);
  margin:22px 0 14px; overflow:hidden; border-radius:3px;
}
.loading-bar::after{
  content:''; display:block; width:30%; height:100%;
  background:var(--gold);
  animation:slide 1.4s var(--ease) infinite;
}
@keyframes slide{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(400%)}
}
.loading-msg{
  font-weight:600; font-size:14px;
  color:var(--text-2);
}

.err-pre{
  font-family:monospace; font-size:13px;
  color:var(--text-2); white-space:pre-wrap;
  line-height:1.6; text-align:left;
  background:var(--surface); border:1px solid var(--border-2);
  border-radius:12px; padding:16px; margin-top:18px;
}
</style>
</head>
<body>

<header class="mast">
  <div class="mast-in">
    <div class="mast-name">Super<em>tecnicos</em></div>
    <div class="mast-right">
      <div class="mast-tag" id="m-tag">R— / 38</div>
      <button class="theme-btn" id="theme-btn" aria-label="Alternar tema">
        <svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
  <div class="mast-bar"><div class="mast-bar-fill" id="m-bar"></div></div>
</header>

<div class="loading" id="loading">
  <div class="loading-mark">Super<em>tecnicos.</em></div>
  <div class="loading-bar"></div>
  <div class="loading-msg">carregando dados</div>
</div>

<main class="wrap" id="content" hidden>

  <section class="pg on" id="pg-tabela">
    <div class="s-title">Pódio<span class="sub" id="round-info">—</span></div>
    <div class="podio" id="podio"></div>

    <div class="s-title">Tabela completa</div>
    <div id="tab-host"></div>
  </section>

  <section class="pg" id="pg-rodadas">
    <div class="s-title">Selecione a rodada</div>
    <div class="pill-wrap"><div class="pills" id="pills"></div></div>
    <div id="gw-body"></div>
  </section>

  <section class="pg" id="pg-stats">
    <div class="s-title">Recordes da temporada</div>
    <div class="records" id="records"></div>

    <div class="s-title">Reis do campeonato</div>
    <div id="kings"></div>

    <div class="s-title cool">Top 5 pontuações</div>
    <div id="hof-top"></div>

    <div class="s-title blood">Piores 3 pontuações</div>
    <div id="hof-flop"></div>
  </section>
</main>

<nav class="nav">
  <div class="nav-g">
    <button class="ntab on" data-p="tabela"><span class="ntab-no">01</span><span class="ntab-tt">Tabela</span></button>
    <button class="ntab" data-p="rodadas"><span class="ntab-no">02</span><span class="ntab-tt">Rodadas</span></button>
    <button class="ntab" data-p="stats"><span class="ntab-no">03</span><span class="ntab-tt">Stats</span></button>
  </div>
</nav>

<script>
(async function(){
'use strict';

const TOTAL_ROUNDS = 38;
const MITOU_THRESHOLD = 80;
const DATA_FILES = [
  'Resultados_do_Campeonato.txt',
  'Resultados do Campeonato.txt',
  'resultados.csv',
  'dados.csv',
];

const TEAM_COLORS = {
  'Sons of Númenor':'#F5B83D', 'Ironverdict':'#5B8AC9', 'Icebergteam':'#3BB8D9',
  'Andorinha Jr':'#E87341', 'Andorinha':'#CF4B3A', 'CEEC':'#6FB03E',
  'Varelitas':'#C48A2A', 'Otopatamá':'#8866D9', 'Lobonegro':'#4D4A43',
};
const TEAM_MONO = {
  'Sons of Númenor':'SN', 'Ironverdict':'IV', 'Icebergteam':'IB',
  'Andorinha Jr':'AJ', 'Andorinha':'AN', 'CEEC':'CE',
  'Varelitas':'VA', 'Otopatamá':'OT', 'Lobonegro':'LN',
};
const CREST_SHAPES = {
  'Sons of Númenor':'M2,4 L38,4 L38,28 Q38,42 20,46 Q2,42 2,28 Z',
  'Ironverdict':'M2,2 L38,2 L38,34 L20,46 L2,34 Z',
  'Icebergteam':'M2,6 L12,2 L28,2 L38,6 L38,30 L20,46 L2,30 Z',
  'Andorinha Jr':'M2,4 Q20,0 38,4 L38,30 Q38,42 20,46 Q2,42 2,30 Z',
  'Andorinha':'M2,4 Q20,0 38,4 L38,30 Q38,42 20,46 Q2,42 2,30 Z',
  'CEEC':'M4,4 L36,4 L36,30 Q36,40 20,46 Q4,40 4,30 Z',
  'Varelitas':'M20,2 L38,12 L38,30 L20,46 L2,30 L2,12 Z',
  'Otopatamá':'M2,2 L38,2 L38,10 L34,14 L34,30 L20,46 L6,30 L6,14 L2,10 Z',
  'Lobonegro':'M2,2 L20,6 L38,2 L38,30 L20,46 L2,30 Z',
};
const CREST_DECOR = {
  'Sons of Númenor':'<polygon points="20,8 22,12 26,12 23,15 24,19 20,17 16,19 17,15 14,12 18,12" fill="currentColor" opacity="0.35"/>',
  'Ironverdict':'<line x1="20" y1="9" x2="20" y2="16" stroke="currentColor" stroke-width="1.2" opacity="0.5"/><line x1="14" y1="12" x2="26" y2="12" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>',
  'Icebergteam':'<polygon points="20,9 24,13 20,17 16,13" fill="currentColor" opacity="0.4"/>',
  'Andorinha Jr':'<path d="M14,13 Q20,9 26,13" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5"/><circle cx="20" cy="12" r="1" fill="currentColor" opacity="0.6"/>',
  'Andorinha':'<path d="M14,14 Q20,10 26,14" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5"/>',
  'CEEC':'<rect x="16" y="10" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.45"/>',
  'Varelitas':'<polygon points="20,10 24,14 20,18 16,14" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>',
  'Otopatamá':'<line x1="14" y1="16" x2="26" y2="16" stroke="currentColor" stroke-width="1.2" opacity="0.5"/><line x1="14" y1="19" x2="26" y2="19" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>',
  'Lobonegro':'<polygon points="17,11 20,15 23,11" fill="currentColor" opacity="0.45"/>',
};

let crestCounter = 0;
function crestSVG(team, sizeClass){
  if(!sizeClass) sizeClass = 'crest-sm';
  const color = TEAM_COLORS[team] || '#FACC15';
  const path  = CREST_SHAPES[team] || 'M2,4 L38,4 L38,30 Q38,42 20,46 Q2,42 2,30 Z';
  const decor = CREST_DECOR[team]  || '';
  const mono  = TEAM_MONO[team]    || team.replace(/[^A-Za-zÀ-ÿ]/g,'').slice(0,2).toUpperCase();
  const id = 'g' + (++crestCounter);
  return '<span class="crest ' + sizeClass + '"><svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg">'
    + '<defs><linearGradient id="' + id + '" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="' + color + '" stop-opacity="0.95"/>'
    + '<stop offset="100%" stop-color="' + color + '" stop-opacity="0.55"/>'
    + '</linearGradient></defs>'
    + '<path d="' + path + '" fill="url(#' + id + ')" stroke="' + color + '" stroke-width="1.2" stroke-linejoin="round"/>'
    + '<g style="color:' + color + '">' + decor + '</g>'
    + '<text x="20" y="31" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="14" fill="#0A1628" letter-spacing="0.02em">' + mono + '</text>'
    + '</svg></span>';
}

const $ = function(s){ return document.querySelector(s); };
const $$ = function(s){ return Array.from(document.querySelectorAll(s)); };
const fmt = function(v){ return (Math.round(v*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2}); };
const esc = function(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); };

/* ── LOAD CSV ────────────────────────────────────────────────── */
async function loadCSV(){
  const tried = [];
  for(const name of DATA_FILES){
    try{
      const r = await fetch(encodeURI(name) + '?t=' + Date.now(), { cache:'no-store' });
      tried.push(name + ' → ' + r.status);
      if(r.ok){
        const txt = await r.text();
        if(txt && txt.trim().length > 0) return txt;
      }
    }catch(e){ tried.push(name + ' → ' + e.message); }
  }
  throw new Error(
    'Nenhum arquivo encontrado.\n\nTentados:\n' + tried.join('\n') +
    '\n\nColoque o CSV no mesmo diretório com um destes nomes:\n' +
    DATA_FILES.map(function(n){ return '· ' + n; }).join('\n')
  );
}

function showError(err){
  const ld = $('#loading');
  ld.innerHTML = '<div style="max-width:380px">'
    + '<div class="loading-mark">Sem <em>dados</em>.</div>'
    + '<div style="width:48px;height:3px;background:var(--blood);margin:16px auto 12px;border-radius:3px"></div>'
    + '<pre class="err-pre">' + esc(err.message) + '</pre>'
    + '</div>';
}

let CSV;
try{ CSV = await loadCSV(); }
catch(err){ showError(err); return; }

/* ── PARSE ───────────────────────────────────────────────────── */
function splitCsvLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c==='"'){ if(inQ && line[i+1]==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c===',' && !inQ){ out.push(cur); cur=''; }
    else cur+=c;
  }
  out.push(cur); return out;
}

const DATA = (function(){
  const lines = CSV.replace(/^\uFEFF/,'').replace(/\r\n?/g,'\n').trim().split('\n').filter(function(l){ return l.trim(); });
  if(!lines.length) return [];
  const first = splitCsvLine(lines[0]);
  const startIdx = isNaN(parseInt(first[0],10)) ? 1 : 0;
  const rows = [];
  for(let i=startIdx;i<lines.length;i++){
    const c = splitCsvLine(lines[i]);
    if(c.length < 3) continue;
    const r = parseInt(c[0],10);
    const t = (c[1]||'').trim();
    const p = parseFloat(String(c[2]).replace(',','.'));
    if(!isFinite(r) || !t || !isFinite(p)) continue;
    rows.push({ rnd:r, team:t, pts:p });
  }
  return rows;
})();

if(!DATA.length){
  showError(new Error('CSV vazio ou sem linhas válidas.\nFormato esperado: rodada,time,pontos'));
  return;
}

const TEAMS  = Array.from(new Set(DATA.map(function(d){ return d.team; })));
const ROUNDS = Array.from(new Set(DATA.map(function(d){ return d.rnd; }))).sort(function(a,b){ return a-b; });
const LAST_RND = ROUNDS[ROUNDS.length-1];

/* ── STATS ───────────────────────────────────────────────────── */
const STATS = {};
TEAMS.forEach(function(t){
  const arr = DATA.filter(function(d){ return d.team===t; }).sort(function(a,b){ return a.rnd-b.rnd; }).map(function(d){ return d.pts; });
  const tot = arr.reduce(function(a,b){ return a+b; }, 0);
  STATS[t] = { pts:arr, total:tot, avg:tot/arr.length, rodadas:arr.length };
});

const positionByRound = {};
ROUNDS.forEach(function(r){
  positionByRound[r] = TEAMS.map(function(t){
    const sum = DATA.filter(function(d){ return d.team===t && d.rnd<=r; }).reduce(function(a,b){ return a+b.pts; }, 0);
    return { team:t, total:sum };
  }).sort(function(a,b){ return b.total-a.total; });
});

const CL = positionByRound[LAST_RND].map(function(x){
  return { team:x.team, total:x.total, avg:STATS[x.team].avg, rodadas:STATS[x.team].rodadas };
});

const CNT = { mvp:{}, lant:{}, mitou:{} };
TEAMS.forEach(function(t){ CNT.mvp[t]=0; CNT.lant[t]=0; CNT.mitou[t]=0; });
ROUNDS.forEach(function(r){
  const rd = DATA.filter(function(d){ return d.rnd===r; }).sort(function(a,b){ return b.pts-a.pts; });
  if(rd.length){ CNT.mvp[rd[0].team]++; CNT.lant[rd[rd.length-1].team]++; }
  rd.forEach(function(d){ if(d.pts >= MITOU_THRESHOLD) CNT.mitou[d.team]++; });
});

const TOP_SCORES   = DATA.slice().sort(function(a,b){ return b.pts-a.pts; }).slice(0,5);
const WORST_SCORES = DATA.slice().sort(function(a,b){ return a.pts-b.pts; }).slice(0,3);

/* ── MASTHEAD ────────────────────────────────────────────────── */
$('#m-tag').textContent = 'R' + String(LAST_RND).padStart(2,'0') + ' / ' + TOTAL_ROUNDS;
$('#round-info').textContent = 'Após R' + String(LAST_RND).padStart(2,'0');
setTimeout(function(){ $('#m-bar').style.width = ((LAST_RND/TOTAL_ROUNDS)*100) + '%'; }, 80);

/* ── PÓDIO + TABELA ──────────────────────────────────────────── */
function renderTabela(){
  const top3 = CL.slice(0,3);
  const podOrder = [top3[1], top3[0], top3[2]];
  const podClass = ['pod2', 'pod1', 'pod3'];
  const medals = ['2º', '1º', '3º'];

  $('#podio').innerHTML = podOrder.map(function(t,i){
    if(!t) return '<div class="pod"></div>';
    return '<div class="pod ' + podClass[i] + '">'
      + '<div class="pod-medal">' + medals[i] + '</div>'
      + '<div class="pod-crest">' + crestSVG(t.team, i===1 ? 'crest-md' : 'crest-sm') + '</div>'
      + '<div class="pod-name">' + esc(t.team) + '</div>'
      + '<div class="pod-pts tnum">' + fmt(t.total) + '</div>'
      + '</div>';
  }).join('');

  const rows = CL.map(function(t,i){
    let cls = '';
    if(i===0) cls='t1'; else if(i===CL.length-1) cls='last';
    const m = CNT.mvp[t.team]||0, l = CNT.lant[t.team]||0, mi = CNT.mitou[t.team]||0;
    const badges = [];
    if(m>0)  badges.push('<span class="tab-badge b-mvp">★ ' + m + ' MVP</span>');
    if(mi>0) badges.push('<span class="tab-badge b-mit">' + mi + ' mit.</span>');
    if(l>0)  badges.push('<span class="tab-badge b-lan">' + l + ' lant.</span>');
    return '<div class="tab-row ' + cls + '">'
      + '<div class="tab-pos">' + (i+1) + '</div>'
      + crestSVG(t.team,'crest-sm')
      + '<div class="tab-mid">'
      +   '<div class="tab-name">' + esc(t.team) + '</div>'
      +   '<div class="tab-badges">' + (badges.length ? badges.join('') : '<span class="tab-badge" style="background:var(--surface-2);color:var(--text-3)">— sem destaques</span>') + '</div>'
      + '</div>'
      + '<div class="tab-pts tnum">' + fmt(t.total) + '</div>'
      + '</div>';
  }).join('');

  $('#tab-host').innerHTML = '<div class="tab-list">' + rows + '</div>';
}

/* ── RODADAS ─────────────────────────────────────────────────── */
let SELECTED_RND = LAST_RND;

function renderPills(){
  $('#pills').innerHTML = ROUNDS.map(function(r){
    return '<button class="pill ' + (r===SELECTED_RND?'on':'') + '" data-rd="' + r + '">R' + String(r).padStart(2,'0') + '</button>';
  }).join('');
  $$('.pill').forEach(function(b){
    b.onclick = function(){
      SELECTED_RND = parseInt(b.dataset.rd, 10);
      renderPills();
      renderRoundBody();
    };
  });
}

function renderRoundBody(){
  const res = DATA.filter(function(d){ return d.rnd===SELECTED_RND; }).sort(function(a,b){ return b.pts-a.pts; });
  if(!res.length){ $('#gw-body').innerHTML=''; return; }
  const mvp = res[0];
  const lant = res.length > 1 ? res[res.length-1] : null;
  const mitou = res.filter(function(r){ return r.pts >= MITOU_THRESHOLD; });
  const middle = res.slice(1, lant ? -1 : undefined);

  let html = '<div class="hero">'
    + crestSVG(mvp.team, 'crest-lg')
    + '<div class="hero-info">'
    +   '<div class="hero-tag">MVP · R' + String(SELECTED_RND).padStart(2,'0') + '</div>'
    +   '<div class="hero-name">' + esc(mvp.team) + '</div>'
    +   '<div class="hero-pts tnum">' + fmt(mvp.pts) + '</div>'
    +   '<div class="hero-pts-lbl">Pontos · mitada</div>'
    + '</div>'
    + '</div>';

  html += '<div class="duo">'
    +   '<div class="duo-card duo-mit">'
    +     '<div class="duo-tag">Mitaram (≥' + MITOU_THRESHOLD + ')</div>'
    +     '<div class="duo-name">' + (mitou.length ? mitou.length + ' time' + (mitou.length!==1?'s':'') + ' nesta rodada' : 'Nenhum nesta rodada') + '</div>'
    +     '<div class="duo-pts tnum">' + mitou.length + '</div>'
    +   '</div>';
  if(lant){
    html += '<div class="duo-card duo-lan">'
      +     '<div class="duo-tag">Lanterna</div>'
      +     '<div class="duo-name">' + esc(lant.team) + '</div>'
      +     '<div class="duo-pts tnum">' + fmt(lant.pts) + '</div>'
      +   '</div>';
  }
  html += '</div>';

  if(mitou.length){
    html += '<div class="mitou-card">'
      + '<div class="mitou-head">Quem mitou</div>'
      + '<div class="mitou-list">'
      + mitou.map(function(r){
          return '<span class="mitou-chip">'
            + crestSVG(r.team,'crest-sm')
            + '<span class="nm">' + esc(r.team) + '</span>'
            + '<span class="pt tnum">' + fmt(r.pts) + '</span>'
            + '</span>';
        }).join('')
      + '</div>'
      + '</div>';
  }

  if(middle.length){
    html += '<div class="s-title">Demais colocações</div>'
      + '<div class="gw-list">'
      + middle.map(function(r,i){
        return '<div class="gw-row">'
          + '<div class="gw-pos">' + (i+2) + '</div>'
          + crestSVG(r.team,'crest-sm')
          + '<div class="gw-name">' + esc(r.team) + '</div>'
          + '<div class="gw-pts tnum ' + (r.pts>=MITOU_THRESHOLD?'mit':'') + '">' + fmt(r.pts) + '</div>'
          + '</div>';
      }).join('')
      + '</div>';
  }

  $('#gw-body').innerHTML = html;
}

/* ── STATS ───────────────────────────────────────────────────── */
function renderStats(){
  const top = TOP_SCORES[0];
  const flop = WORST_SCORES[0];

  $('#records').innerHTML =
    '<div class="rec rec-mvp">'
    +   '<div class="rec-tag">Maior mitada</div>'
    +   '<div class="rec-pts tnum">' + fmt(top.pts) + '</div>'
    +   '<div class="rec-name">' + esc(top.team) + '</div>'
    +   '<div class="rec-rd">Rodada ' + String(top.rnd).padStart(2,'0') + '</div>'
    + '</div>'
    + '<div class="rec rec-lan">'
    +   '<div class="rec-tag">Pior pontuação</div>'
    +   '<div class="rec-pts tnum">' + fmt(flop.pts) + '</div>'
    +   '<div class="rec-name">' + esc(flop.team) + '</div>'
    +   '<div class="rec-rd">Rodada ' + String(flop.rnd).padStart(2,'0') + '</div>'
    + '</div>';

  const reiMvp   = Object.entries(CNT.mvp).sort(function(a,b){ return b[1]-a[1]; })[0];
  const reiMitou = Object.entries(CNT.mitou).sort(function(a,b){ return b[1]-a[1]; })[0];
  const reiLant  = Object.entries(CNT.lant).sort(function(a,b){ return b[1]-a[1]; })[0];

  $('#kings').innerHTML = '<div class="kings">'
    + '<div class="king gold">'
    +   crestSVG(reiMvp[0],'crest-md')
    +   '<div class="king-info">'
    +     '<div class="king-tag">MVP do campeonato</div>'
    +     '<div class="king-name">' + esc(reiMvp[0]) + '</div>'

    +   '<div class="king-cnt-wrap">'
    +     '<div class="king-cnt tnum">' + reiMvp[1] + '</div>'
    +     '<div class="king-cnt-sub">rodadas</div>'
    +   '</div>'
    + '</div>'
    + '<div class="king cool">'
    +   crestSVG(reiMitou[0],'crest-md')
    +   '<div class="king-info">'
    +     '<div class="king-tag">Mais mitadas (≥' + MITOU_THRESHOLD + ')</div>'
    +     '<div class="king-name">' + esc(reiMitou[0]) + '</div>'
    +   '</div>'
    +   '<div class="king-cnt-wrap">'
    +     '<div class="king-cnt tnum">' + reiMitou[1] + '</div>'
    +     '<div class="king-cnt-sub">vezes ' + MITOU_THRESHOLD + '+</div>'
    +   '</div>'
    + '</div>'
    + '<div class="king blood">'
    +   crestSVG(reiLant[0],'crest-md')
    +   '<div class="king-info">'
    +     '<div class="king-tag">Lanterna do campeonato</div>'
    +     '<div class="king-name">' + esc(reiLant[0]) + '</div>'
    +   '</div>'
    +   '<div class="king-cnt-wrap">'
    +     '<div class="king-cnt tnum">' + reiLant[1] + '</div>'
    +     '<div class="king-cnt-sub">lanternadas</div>'
    +   '</div>'
    + '</div>'
    + '</div>';

  $('#hof-top').innerHTML = '<div class="hof">'
    + TOP_SCORES.map(function(s,i){
      return '<div class="hof-row">'
        + '<div class="hof-num">' + (i+1) + '</div>'
        + crestSVG(s.team,'crest-sm')
        + '<div class="hof-name">' + esc(s.team) + '</div>'
        + '<div class="hof-rd">R' + String(s.rnd).padStart(2,'0') + '</div>'
        + '<div class="hof-pts tnum">' + fmt(s.pts) + '</div>'
        + '</div>';
    }).join('')
    + '</div>';

  $('#hof-flop').innerHTML = '<div class="hof flop">'
    + WORST_SCORES.map(function(s,i){
      return '<div class="hof-row">'
        + '<div class="hof-num">' + (i+1) + '</div>'
        + crestSVG(s.team,'crest-sm')
        + '<div class="hof-name">' + esc(s.team) + '</div>'
        + '<div class="hof-rd">R' + String(s.rnd).padStart(2,'0') + '</div>'
        + '<div class="hof-pts tnum">' + fmt(s.pts) + '</div>'
        + '</div>';
    }).join('')
    + '</div>';
}

/* ── NAV / TABS ──────────────────────────────────────────────── */
$$('.ntab').forEach(function(t){
  t.onclick = function(){
    $$('.ntab').forEach(function(x){ x.classList.remove('on'); });
    $$('.pg').forEach(function(x){ x.classList.remove('on'); });
    t.classList.add('on');
    $('#pg-' + t.dataset.p).classList.add('on');
    window.scrollTo({ top:0, behavior:'smooth' });
  };
});

/* ── THEME ───────────────────────────────────────────────────── */
const themeBtn = $('#theme-btn');
const themeIcon = $('#theme-icon');
const ICON_MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const ICON_SUN  = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
function setTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  themeIcon.innerHTML = t==='dark' ? ICON_MOON : ICON_SUN;
  try{ localStorage.setItem('st-theme', t); }catch(e){}
}
try{
  const saved = localStorage.getItem('st-theme');
  if(saved) setTheme(saved);
  else if(window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
  else setTheme('dark');
}catch(e){ setTheme('dark'); }
themeBtn.onclick = function(){
  setTheme(document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
};

/* ── GO ──────────────────────────────────────────────────────── */
renderTabela();
renderPills();
renderRoundBody();
renderStats();

$('#loading').style.display = 'none';
$('#content').hidden = false;

})();
</script>
